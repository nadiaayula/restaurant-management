name: Build and Push to Azure Registry

on:
  push:
    branches:
      - main # Mengaktifkan CI/CD setiap kali kamu push ke branch main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code dari GitHub
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Login ke Azure Container Registry (ACR) menggunakan key tadi
      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets::AZURE_REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets::AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets::AZURE_REGISTRY_PASSWORD }}

      # 3. Build & Push Image untuk Backend (Server)
      - name: Build and Push Server Image
        run: |
          docker build -t ${{ secrets::AZURE_REGISTRY_LOGIN_SERVER }}/restaurant-server:latest ./server
          docker push ${{ secrets::AZURE_REGISTRY_LOGIN_SERVER }}/restaurant-server:latest

      # 4. Build & Push Image untuk Frontend (Client)
      - name: Build and Push Client Image
        run: |
          docker build -t ${{ secrets::AZURE_REGISTRY_LOGIN_SERVER }}/restaurant-client:latest ./client
          docker push ${{ secrets::AZURE_REGISTRY_LOGIN_SERVER }}/restaurant-client:latest